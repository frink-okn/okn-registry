site_name: "Proto-OKN: Fabric"
theme:
  name: material
  custom_dir: material
  logo: assets/images/frink.png
  palette:
    scheme: default
    primary: custom
  font:
    text: Open Sans
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - toc.follow
    - toc.integrate #puts the page anchor links on the left, instead of the right
    - navigation.indexes
extra_css:
  - styles.css
extra_javascript:
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - javascripts/header-button.js
  - javascripts/tablesort.js
  - javascripts/mermaid.mjs
hooks:
  - hooks/kg_page_data.py
watch:
  - docs/registry/void
  - docs/registry/queries
  - hooks
  - material
plugins:
  - search
  - mermaid2:
      javascript: https://unpkg.com/mermaid@10.4.0/dist/mermaid.esm.min.mjs
      arguments:
        maxTextSize: 500000
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
        # make exceptions to highlighting of code:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
nav:
  - Explore:
    - registry/index.md
    - KG Statistics: okn/kgstatus.md
    - Knowledge Map: okn/learn/index.md
  - Query:
    - Query Tool: query/query-page.md
    - Sample Query Library: query/sample-query-library.md
  - Contribute:
    - The OKN Book:
      - Overview: book/index.md
      - Graph Construction Best Practices: book/best-practices.md
      - About External Identifiers: book/identifiers.md
      - Biomedical Identifier Choices: book/biomedical-identifiers.md
      - Ingesting Identifier Sources: book/new-id-sources.md
    - Quick Start Guide:
      - help/index.md
      - Setup Your FRINK Repo in the Landing Zone: help/setup.md
      - Update Query Tool: help/update.md
      - Query knowledge graphs in FRINK: help/query-page.md
      - Update Example Queries on FRINK UI: help/update-queries.md
site_url: https://frink-okn.github.io
repo_url: https://github.com/frink-okn/frink-landing-zone/

#     - Knowledge Graph (KG) Dataset Status: okn/kgstatus.md (add these links to the registry pages)
