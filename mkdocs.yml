site_name: "Proto-OKN: Fabric"
theme:
  name: material
  custom_dir: material
  logo: assets/images/frink.png
  palette:
    scheme: default
    primary: custom
  font:
    text: Open Sans
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - toc.follow
    - toc.integrate #puts the page anchor links on the left, instead of the right
    - navigation.indexes
extra_css:
  - https://cdn.datatables.net/2.3.7/css/dataTables.dataTables.css
  - styles.css
extra_javascript:
  - https://code.jquery.com/jquery-4.0.0.min.js
  - https://cdn.datatables.net/2.3.7/js/dataTables.js
  - javascripts/header-button.js
  - javascripts/datatables.js
  - javascripts/mermaid.mjs
hooks:
  - hooks/kg_page_data.py
watch:
  - docs/registry/void
  - docs/registry/queries
  - hooks
  - material
plugins:
  - search
  - mermaid2:
      javascript: https://unpkg.com/mermaid@10.4.0/dist/mermaid.esm.min.mjs
      arguments:
        maxTextSize: 500000
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
        # make exceptions to highlighting of code:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
nav:
  - Explore: registry/index.md
  - Query:
    - Query Tool: query/query-page.md
    - Sample Query Library: query/sample-query-library.md
  - Contribute:
    - The OKN Book:
      - Overview: book/index.md
      - Graph Construction Best Practices: book/best-practices.md
      - About External Identifiers: book/identifiers.md
      - Identifier Choices:
        - Biomedical: book/biomedical-identifiers.md
        - Environmental: book/environmental-identifiers.md
        - Geospatial: book/geospatial-identifiers.md
        - Institutions: book/institutions.md
        - Justice: book/justice.md
      - Ingesting Identifier Sources: book/new-id-sources.md
    - Quick Start Guide:
      - help/index.md
      - Setup Your FRINK Repo in the Landing Zone: help/setup.md
      - Update Query Tool: help/update.md
      - Query knowledge graphs in FRINK: help/query-page.md
      - Update Example Queries on FRINK UI: help/update-queries.md
site_url: https://frink.renci.org
repo_url: https://github.com/frink-okn/okn-registry/
